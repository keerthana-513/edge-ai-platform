<!DOCTYPE html>
<html>
<head>
    <title>Edge AI Dashboard</title>
    <style>
        body { font-family: sans-serif; margin: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #f4f4f4; }
        form { margin-bottom: 20px; }
    </style>
</head>
<body>
    <h1>Edge AI Analytics Dashboard</h1>
    
    <h3>Add a New Task</h3>
    <form method="POST">
        <input type="text" name="task" placeholder="Enter task content..." required>
        <button type="submit">Submit Task</button>
    </form>

    <table>
        <tr>
            <th>ID</th><th>Task</th><th>Status</th><th>Result</th>
        </tr>
        {% for task in tasks %}
        <tr>
            <td>{{ task['id'] }}</td>
            <td>{{ task['payload'] }}</td>
            <td>{{ task['status'] }}</td>
            <td>{{ task['result'] }}</td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
